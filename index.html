<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>造梦江湖 - 小宝传奇</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; touch-action: none; }
        #game-area { width: 100vw; height: 100vh; position: relative; }
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a0a05; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
            color: #ffd700; font-family: 'Microsoft YaHei', sans-serif; transition: opacity 1s;
        }
        .spinner { width: 40px; height: 40px; border: 3px solid #4a2a10;
            border-top-color: #ffd700; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #load-msg { font-size: 14px; color: #d4a574; }
        #tip { font-size: 11px; color: #8b6914; margin-top: 8px; }
        #controls { position: fixed; bottom: 8px; right: 8px; display: flex; gap: 6px; z-index: 200; flex-wrap: wrap; }
        #controls button { background: rgba(30,15,10,0.8); color: #d4a574; border: 1px solid #8b4513;
            padding: 3px 10px; border-radius: 3px; font-size: 11px; cursor: pointer; }
        #debug-panel {
            position: fixed; top: 4px; left: 4px; z-index: 300;
            background: rgba(0,0,0,0.9); color: #0f0; font-family: monospace;
            font-size: 10px; padding: 4px 6px; border-radius: 3px;
            max-width: 95vw; max-height: 50vh; overflow-y: auto;
            pointer-events: auto; display: none; white-space: pre-wrap; word-break: break-all;
        }
        #debug-panel.show { display: block; }
    </style>
    <script>
    window.RufflePlayer = window.RufflePlayer || {};
    window.RufflePlayer.config = {
        allowScriptAccess: true,
        scale: "showAll",
        backgroundColor: "#000000",
        letterbox: "on",
        autoplay: "on",
        unmuteOverlay: "hidden",
        logLevel: "warn",
        maxExecutionDuration: 300,
        baseUrl: location.href.substring(0, location.href.lastIndexOf('/') + 1),
    };
    </script>
    <script src="ruffle/ruffle.js"></script>
</head>
<body>
    <div id="game-area">
        <div id="loading">
            <div class="spinner"></div>
            <div id="load-msg">初始化播放器...</div>
            <div id="tip">首次加载需下载约10MB资源</div>
        </div>
    </div>
    <div id="controls">
        <button onclick="fullscreen()">全屏</button>
        <button onclick="location.reload()">刷新</button>
        <button onclick="toggleDebug()">调试</button>
        <button onclick="testClick()">模拟点击</button>
    </div>
    <div id="debug-panel"></div>

    <script>
    // ========== Debug System v5 - NO feedback loop ==========
    var debugPanel = document.getElementById('debug-panel');
    var debugLogs = [];
    var debugShown = false;
    var MAX_LOGS = 200;
    var insideLog = false;

    function dlog(msg) {
        if (insideLog) return; // Prevent feedback loop
        insideLog = true;
        try {
            var t = new Date().toLocaleTimeString();
            var line = '[' + t + '] ' + msg;
            debugLogs.push(line);
            if (debugLogs.length > MAX_LOGS) debugLogs.shift();
            if (debugShown) {
                var recent = debugLogs.slice(-40);
                debugPanel.textContent = recent.join('\n');
                debugPanel.scrollTop = debugPanel.scrollHeight;
            }
        } catch(e) {}
        insideLog = false;
    }

    function toggleDebug() {
        debugShown = !debugShown;
        debugPanel.classList.toggle('show', debugShown);
        if (debugShown) {
            var recent = debugLogs.slice(-40);
            debugPanel.textContent = recent.join('\n');
            debugPanel.scrollTop = debugPanel.scrollHeight;
        }
    }

    // ========== 4399 JS Bridge Complete Mock ==========
    window._4399_function_store_id = function(d) { dlog('store: ' + JSON.stringify(d)); return true; };
    window._4399_function_payMoney_id = function(d) { dlog('pay: ' + JSON.stringify(d)); return true; };
    window._4399_function_shop_id = function(d) { dlog('shop: ' + JSON.stringify(d)); return true; };
    window._4399_function_rankList_id = function(d) { dlog('rank: ' + JSON.stringify(d)); return true; };
    window._4399_getUserInfo = function() {
        return JSON.stringify({uid:'12345678',username:'Player',isLogin:true,vip:0});
    };
    window.jsSaveGame = function(data) { localStorage.setItem('dj_save', data); return 'ok'; };
    window.jsLoadGame = function() { return localStorage.getItem('dj_save') || ''; };
    window.jsSetShare = function() { return 'ok'; };
    window.jsLogin4399 = function() { return JSON.stringify({uid:'12345678',username:'Player',isLogin:true}); };
    window.jsPayCallback = function() { return 'ok'; };
    window.jsGetServerTime = function() { return Math.floor(Date.now()/1000).toString(); };
    window._4399_callback = function() { return true; };

    // ========== Service Worker ==========
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw-intercept.js').then(function() {
            dlog('SW Registered');
        }).catch(function(e) { dlog('SW Error: ' + e); });
    }

    // ========== Game Init ==========
    var rufflePlayer = null;

    (function() {
        var loadMsg = document.getElementById('load-msg');
        var loading = document.getElementById('loading');
        var gameArea = document.getElementById('game-area');

        function init() {
            try {
                loadMsg.textContent = '创建播放器...';
                var R = window.RufflePlayer.newest();
                if (!R) { loadMsg.textContent = '播放器加载失败'; return; }

                rufflePlayer = R.createPlayer();
                rufflePlayer.id = 'ruffle-player';
                rufflePlayer.style.width = '100%';
                rufflePlayer.style.height = '100%';
                gameArea.appendChild(rufflePlayer);

                loadMsg.textContent = '加载造梦江湖...';
                dlog('Ruffle player created, loading game_core.swf');

                // Monitor pointer events on player
                ['pointerdown','pointerup','click'].forEach(function(evt) {
                    rufflePlayer.addEventListener(evt, function(e) {
                        dlog(evt + ' @ ' + Math.round(e.offsetX) + ',' + Math.round(e.offsetY));
                    }, true);
                });

                // Load the game
                rufflePlayer.load({
                    url: 'game_core.swf',
                    allowScriptAccess: true,
                    parameters: {
                        isLocal: 'true',
                        store_key: '3885799f65acec467d97b4923caebaae',
                        pay_key: '10f73c09b41d9f41e761232f5f322f38',
                        shop_key: '30ea6b51a23275df624b781c3eb43ac6',
                        rank_key: '69f52ab6eb1061853a761ee8c26324ae',
                        uid: '12345678',
                        username: 'Player'
                    }
                }).then(function() {
                    loadMsg.textContent = '游戏加载完成！';
                    dlog('SWF loaded OK');
                    setTimeout(function() {
                        loading.style.opacity = '0';
                        setTimeout(function() { loading.style.display = 'none'; }, 1000);
                    }, 2000);
                }).catch(function(err) {
                    loadMsg.textContent = '加载失败: ' + err.message;
                    dlog('SWF load error: ' + err.message);
                });

            } catch(e) {
                loadMsg.textContent = '错误: ' + e.message;
                dlog('Init error: ' + e.message);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();

    // ========== Simulate Click ==========
    function testClick() {
        var player = rufflePlayer || document.querySelector('ruffle-player');
        if (!player) { dlog('No player found'); return; }

        var rect = player.getBoundingClientRect();
        var cx = rect.width / 2;
        var cy = rect.height * 0.65;
        
        dlog('Simulating click at ' + Math.round(cx) + ',' + Math.round(cy));
        
        ['pointerdown','pointerup','click'].forEach(function(type) {
            player.dispatchEvent(new PointerEvent(type, {
                clientX: rect.left + cx,
                clientY: rect.top + cy,
                offsetX: cx, offsetY: cy,
                bubbles: true, cancelable: true,
                pointerId: 1, pointerType: 'mouse',
                button: 0, buttons: type === 'pointerdown' ? 1 : 0
            }));
        });
    }

    window.onerror = function(msg, url, line) { dlog('JS Error: ' + msg + ' @ L' + line); };
    window.addEventListener('unhandledrejection', function(e) {
        dlog('Promise rejected: ' + (e.reason ? e.reason.message || String(e.reason) : '?'));
    });

    function fullscreen() {
        var p = document.querySelector('ruffle-player') || document.getElementById('game-area');
        if (document.fullscreenElement) document.exitFullscreen();
        else p.requestFullscreen();
    }
    </script>
</body>
</html>
