<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>造梦江湖 - Flash模拟器版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            width: 800px;
            height: 600px;
            max-width: 100vw;
            max-height: calc(100vh - 20px);
        }
        /* Ruffle player fills container */
        #game-container ruffle-player {
            width: 100%;
            height: 100%;
        }
        .controls {
            position: fixed; bottom: 5px; right: 10px;
            display: flex; gap: 6px; z-index: 100;
        }
        .controls button {
            background: rgba(42,21,16,0.8); color: #d4a574; border: 1px solid #8b4513;
            padding: 3px 10px; border-radius: 3px; cursor: pointer; font-size: 0.7em;
        }
        .controls button:hover { background: #3a2520; color: #ffd700; }
    </style>
</head>
<body>
    <div id="game-container">
        <object data="game_core.swf" type="application/x-shockwave-flash" width="800" height="600">
            <param name="movie" value="game_core.swf">
            <param name="quality" value="high">
            <param name="bgcolor" value="#000000">
            <param name="allowScriptAccess" value="never">
            <param name="allowFullScreen" value="true">
        </object>
    </div>
    <div class="controls">
        <button onclick="toggleFullscreen()">全屏</button>
        <button onclick="location.reload()">刷新</button>
    </div>

    <!-- Ruffle polyfill - 自动替换<object>标签中的Flash内容 -->
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            allowScriptAccess: false,
            scale: "showAll",
            backgroundColor: "#000000",
            letterbox: "on",
            autoplay: "on",
            unmuteOverlay: "hidden",
            logLevel: "warn",
            maxExecutionDuration: 30,
            baseUrl: window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1),
        };
    </script>
    <script src="ruffle/ruffle.js"></script>
    <script>
        function toggleFullscreen() {
            const player = document.querySelector('ruffle-player');
            if (document.fullscreenElement) document.exitFullscreen();
            else if (player) player.requestFullscreen();
            else document.getElementById('game-container').requestFullscreen();
        }
    </script>
</body>
</html>
