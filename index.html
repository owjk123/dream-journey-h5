<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>造梦江湖 - Ruffle版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        #game-area { width: 100vw; height: 100vh; }
        #game-area ruffle-player { width: 100%; height: 100%; }
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
            color: #ffd700; font-family: sans-serif; transition: opacity 0.5s;
        }
        .spinner { width: 40px; height: 40px; border: 3px solid #333;
            border-top-color: #ffd700; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #load-msg { font-size: 14px; }
        #controls {
            position: fixed; bottom: 8px; right: 8px;
            display: flex; gap: 6px; z-index: 200;
        }
        #controls button {
            background: rgba(30,15,10,0.8); color: #d4a574; border: 1px solid #8b4513;
            padding: 3px 10px; border-radius: 3px; font-size: 11px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="game-area">
        <div id="loading">
            <div class="spinner"></div>
            <div id="load-msg">初始化中...</div>
        </div>
    </div>
    <div id="controls">
        <button onclick="fullscreen()">全屏</button>
        <button onclick="location.reload()">刷新</button>
    </div>

    <script>
    // Mock 4399 APIs - 游戏主体期望的4399接口
    window._4399_function_store_id = function(data) { console.log('[4399] store:', data); return true; };
    window._4399_function_payMoney_id = function(data) { console.log('[4399] pay:', data); return true; };
    window._4399_function_shop_id = function(data) { console.log('[4399] shop:', data); return true; };
    window._4399_function_rankList_id = function(data) { console.log('[4399] rank:', data); return true; };

    // Service Worker拦截4399网络请求
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw-intercept.js').catch(e => console.log('SW error:', e));
    }

    // Ruffle配置
    window.RufflePlayer = window.RufflePlayer || {};
    window.RufflePlayer.config = {
        allowScriptAccess: true,
        scale: "showAll",
        backgroundColor: "#000000",
        letterbox: "on",
        autoplay: "on",
        unmuteOverlay: "hidden",
        logLevel: "warn",
        maxExecutionDuration: 60,
        baseUrl: window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1),
    };
    </script>
    <script src="ruffle/ruffle.js"></script>
    <script>
        const loadMsg = document.getElementById('load-msg');
        const loading = document.getElementById('loading');
        const gameArea = document.getElementById('game-area');

        window.addEventListener("DOMContentLoaded", function() {
            try {
                loadMsg.textContent = '创建播放器...';
                const Ruffle = window.RufflePlayer.newest();
                const player = Ruffle.createPlayer();
                player.style.width = '100%';
                player.style.height = '100%';
                gameArea.appendChild(player);

                loadMsg.textContent = '加载游戏主体...';

                // 直接加载游戏主体SWF（跳过4399壳）
                player.load({ url: 'game_core.swf', allowScriptAccess: true }).then(() => {
                    loadMsg.textContent = '游戏已加载';
                    setTimeout(() => { loading.style.opacity = '0'; setTimeout(() => loading.style.display = 'none', 500); }, 2000);
                }).catch(err => {
                    loadMsg.textContent = '加载失败: ' + err.message;
                });
            } catch(e) {
                loadMsg.textContent = '错误: ' + e.message;
            }
        });

        function fullscreen() {
            const player = document.querySelector('ruffle-player');
            if (document.fullscreenElement) document.exitFullscreen();
            else (player || gameArea).requestFullscreen();
        }
    </script>
</body>
</html>
