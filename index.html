<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>造梦江湖 - Flash模拟器版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Microsoft YaHei', sans-serif;
            color: #d4a574;
            overflow: hidden;
        }
        .header {
            text-align: center; padding: 8px; width: 100%;
            background: linear-gradient(180deg, #2a1510 0%, transparent 100%);
        }
        .header h1 { font-size: 1.1em; color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .header p { font-size: 0.65em; color: #8b7355; margin-top: 2px; }
        #game-container {
            width: 800px; height: 600px; max-width: 100vw;
            max-height: calc(100vh - 50px);
            background: #000; border: 2px solid #8b4513;
            border-radius: 4px; position: relative;
        }
        .loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            text-align: center; color: #ffd700; z-index: 10;
        }
        .loading .spinner {
            width: 40px; height: 40px; border: 3px solid #8b4513;
            border-top-color: #ffd700; border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .controls { margin-top: 6px; display: flex; gap: 8px; }
        .controls button {
            background: #2a1510; color: #d4a574; border: 1px solid #8b4513;
            padding: 4px 12px; border-radius: 3px; cursor: pointer; font-size: 0.75em;
        }
        .controls button:hover { background: #3a2520; color: #ffd700; }
        .note { margin-top: 6px; font-size: 0.6em; color: #665544; text-align: center; max-width: 600px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚔ 造梦江湖 ⚔</h1>
        <p>Ruffle Flash模拟器 · 原版游戏在线运行</p>
    </div>
    <div id="game-container">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>正在加载游戏...</div>
        </div>
    </div>
    <div class="controls">
        <button onclick="toggleFullscreen()">全屏</button>
        <button onclick="restartGame()">重新加载</button>
    </div>
    <div class="note">⚠ 原版为4399在线游戏，部分功能需服务器支持。如遇问题请刷新。</div>

    <script>
        // 必须在ruffle.js加载前设置配置
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            allowScriptAccess: false,
            scale: "showAll",
            backgroundColor: "#000000",
            letterbox: "on",
            autoplay: "on",
            unmuteOverlay: "hidden",
            logLevel: "warn",
            maxExecutionDuration: 30,
            baseUrl: window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1),
        };
    </script>
    <script src="ruffle/ruffle.js"></script>
    <script>
        window.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById('game-container');
            const loadingEl = document.getElementById('loading');
            
            try {
                const ruffle = window.RufflePlayer.newest();
                const player = ruffle.createPlayer();
                player.style.width = '100%';
                player.style.height = '100%';
                container.appendChild(player);
                
                // 正确的API: player.ruffle().load()
                player.ruffle().load("game_core.swf");
                
                // 隐藏loading
                setTimeout(() => { loadingEl.style.display = 'none'; }, 3000);
            } catch(e) {
                console.error('Ruffle init error:', e);
                loadingEl.innerHTML = '<div>加载失败: ' + e.message + '</div>';
            }
        });

        function toggleFullscreen() {
            if (document.fullscreenElement) document.exitFullscreen();
            else document.getElementById('game-container').requestFullscreen();
        }
        function restartGame() { location.reload(); }
    </script>
</body>
</html>
