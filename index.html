<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>造梦江湖 - 小宝传奇</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        #game-area { width: 100vw; height: 100vh; }
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a0a05; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
            color: #ffd700; font-family: 'Microsoft YaHei', sans-serif; transition: opacity 0.5s;
        }
        .spinner { width: 40px; height: 40px; border: 3px solid #4a2a10;
            border-top-color: #ffd700; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #load-msg { font-size: 14px; color: #d4a574; }
        #controls { position: fixed; bottom: 8px; right: 8px; display: flex; gap: 6px; z-index: 200; }
        #controls button { background: rgba(30,15,10,0.8); color: #d4a574; border: 1px solid #8b4513;
            padding: 3px 10px; border-radius: 3px; font-size: 11px; cursor: pointer; }
    </style>
    <script>
    window.RufflePlayer = window.RufflePlayer || {};
    window.RufflePlayer.config = {
        allowScriptAccess: true,
        scale: "showAll",
        backgroundColor: "#000000",
        letterbox: "on",
        autoplay: "on",
        unmuteOverlay: "hidden",
        logLevel: "warn",
        maxExecutionDuration: 120,
        baseUrl: location.href.substring(0, location.href.lastIndexOf('/') + 1),
    };
    </script>
    <script src="ruffle/ruffle.js"></script>
</head>
<body>
    <div id="game-area">
        <object id="flash-game" type="application/x-shockwave-flash" data="xbcqv147.swf" width="100%" height="100%">
            <param name="allowScriptAccess" value="always">
            <param name="scale" value="showAll">
            <param name="bgcolor" value="#000000">
            <param name="wmode" value="direct">
        </object>
    </div>
    <div id="loading">
        <div class="spinner"></div>
        <div id="load-msg">加载造梦江湖...</div>
    </div>
    <div id="controls">
        <button onclick="fullscreen()">全屏</button>
        <button onclick="location.reload()">刷新</button>
    </div>
    <script>
    window._4399_function_store_id = function(d) { return true; };
    window._4399_function_payMoney_id = function(d) { return true; };
    window._4399_function_shop_id = function(d) { return true; };
    window._4399_function_rankList_id = function(d) { return true; };
    window._4399_getUserInfo = function() {
        return JSON.stringify({uid:'12345678',username:'Player',isLogin:true,vip:0});
    };
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw-intercept.js').then(() => console.log('[SW] OK')).catch(e => console.log('[SW] Err:', e));
    }
    // Hide loading when game starts
    setTimeout(function() {
        var loading = document.getElementById('loading');
        var rp = document.querySelector('ruffle-player');
        if (rp || document.querySelector('canvas')) {
            loading.style.opacity = '0';
            setTimeout(function() { loading.style.display = 'none'; }, 500);
        }
    }, 10000);
    function fullscreen() {
        var p = document.querySelector('ruffle-player') || document.getElementById('game-area');
        if (document.fullscreenElement) document.exitFullscreen();
        else p.requestFullscreen();
    }
    </script>
</body>
</html>
