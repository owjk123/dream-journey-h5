<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>造梦江湖 - 小宝传奇</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        #game-area { width: 100vw; height: 100vh; }
        #game-area ruffle-player { width: 100%; height: 100%; }
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a0a05; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
            color: #ffd700; font-family: 'Microsoft YaHei', sans-serif; transition: opacity 0.5s;
        }
        .spinner { width: 40px; height: 40px; border: 3px solid #4a2a10;
            border-top-color: #ffd700; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #load-msg { font-size: 14px; color: #d4a574; }
        #controls { position: fixed; bottom: 8px; right: 8px; display: flex; gap: 6px; z-index: 200; }
        #controls button { background: rgba(30,15,10,0.8); color: #d4a574; border: 1px solid #8b4513;
            padding: 3px 10px; border-radius: 3px; font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="game-area">
        <div id="loading"><div class="spinner"></div><div id="load-msg">初始化中...</div></div>
    </div>
    <div id="controls">
        <button onclick="fullscreen()">全屏</button>
        <button onclick="location.reload()">刷新</button>
    </div>
    <script>
    window._4399_function_store_id = function(d) { return true; };
    window._4399_function_payMoney_id = function(d) { return true; };
    window._4399_function_shop_id = function(d) { return true; };
    window._4399_function_rankList_id = function(d) { return true; };
    window._4399_getUserInfo = function() {
        return JSON.stringify({uid:'12345678',username:'Player',isLogin:true,vip:0});
    };
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw-intercept.js').then(() => console.log('[SW] Registered')).catch(e => console.log('[SW] Error:', e));
    }
    window.RufflePlayer = window.RufflePlayer || {};
    window.RufflePlayer.config = {
        allowScriptAccess: true, scale: "showAll", backgroundColor: "#000000",
        letterbox: "on", autoplay: "on", unmuteOverlay: "hidden",
        logLevel: "warn", maxExecutionDuration: 120,
        baseUrl: location.href.substring(0, location.href.lastIndexOf('/') + 1),
    };
    </script>
    <script src="ruffle/ruffle.js"></script>
    <script>
    (function() {
        var loadMsg = document.getElementById('load-msg');
        var loading = document.getElementById('loading');
        var gameArea = document.getElementById('game-area');
        function initGame() {
            try {
                loadMsg.textContent = '创建播放器...';
                var R = window.RufflePlayer.newest();
                if (!R) { loadMsg.textContent = 'Ruffle未加载'; return; }
                var player = R.createPlayer();
                player.style.width = '100%'; player.style.height = '100%';
                gameArea.appendChild(player);
                loadMsg.textContent = '加载造梦江湖...';
                player.load({ url: 'xbcqv147.swf', allowScriptAccess: true }).then(function() {
                    loadMsg.textContent = '游戏已加载';
                    setTimeout(function() { loading.style.opacity = '0'; setTimeout(function() { loading.style.display = 'none'; }, 500); }, 3000);
                }).catch(function(err) {
                    loadMsg.textContent = '加载失败: ' + err.message;
                });
            } catch(e) { loadMsg.textContent = '错误: ' + e.message; }
        }
        if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', initGame); }
        else { initGame(); }
    })();
    function fullscreen() {
        var p = document.querySelector('ruffle-player');
        if (document.fullscreenElement) document.exitFullscreen();
        else (p || document.getElementById('game-area')).requestFullscreen();
    }
    </script>
</body>
</html>
